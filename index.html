<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geldfluss – Sankey-Diagramm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
  <style>
    :root {
      --bg: #eef6f0;
      --bg-accent: #d8f3e4;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --accent: #059669;
      --accent-hover: #047857;
      --accent-soft: rgba(5, 150, 105, 0.14);
      --outcome-tint: #fff1f2;
      --outcome-tint2: #ffe4e6;
      --shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.06), 0 10px 24px -8px rgba(15, 23, 42, 0.12);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 80% at 50% -20%, var(--bg-accent), transparent);
      margin: 0;
      padding: clamp(1rem, 3vw, 2rem);
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-size: clamp(1.35rem, 2.5vw, 1.65rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 1.25rem 0;
      color: var(--text);
    }
    .layout {
      display: flex;
      gap: clamp(1rem, 2vw, 1.75rem);
      flex-wrap: wrap;
      align-items: flex-start;
      max-width: 1320px;
      margin: 0 auto;
    }
    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: clamp(1.1rem, 2.5vw, 1.5rem);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .panel h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 1.25rem 0 0.85rem 0;
      color: var(--text-muted);
    }
    .panel h2:first-child {
      margin-top: 0;
    }
    .cat-heading {
      font-size: 0.8rem;
      font-weight: 600;
      margin: 0.6rem 0 0.85rem 0;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .category-block {
      margin-bottom: 1rem;
      padding: 0.85rem 1rem 1rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(180deg, var(--outcome-tint) 0%, var(--outcome-tint2) 100%);
      border: 1px solid #fecdd3;
    }
    .category-block:last-of-type {
      margin-bottom: 0.5rem;
    }
    .form-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .form-row label {
      min-width: 10rem;
      font-size: 0.875rem;
    }
    .form-row input[type="number"] {
      width: 6.25rem;
      padding: 0.45rem 0.55rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-variant-numeric: tabular-nums;
      text-align: right;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .form-row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .income-row { margin-bottom: 0.5rem; }
    .income-row .label-input { flex: 1; min-width: 8rem; }
    .income-row .value-input { width: 6.25rem; flex-shrink: 0; }
    .cat-main-row .label-input { flex: 1; min-width: 8rem; }
    .cat-extra-row .extra-label { flex: 1; min-width: 8rem; }
    .cat-extra-row .extra-value { width: 6.25rem; flex-shrink: 0; }
    button {
      margin-top: 1rem;
      padding: 0.55rem 1.35rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font);
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(5, 150, 105, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    button:hover {
      filter: brightness(1.05);
      box-shadow: 0 4px 14px rgba(5, 150, 105, 0.38);
    }
    button:active {
      transform: translateY(1px);
    }
    button.btn-add {
      margin-top: 0.35rem;
      margin-bottom: 0.75rem;
      padding: 0.4rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-strong);
      box-shadow: none;
      filter: none;
    }
    button.btn-add:hover {
      background: var(--outcome-tint);
      border-color: #f472b6;
      color: #9d174d;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.06);
    }
    button.btn-add[hidden] { display: none; }
    button.btn-remove-sub,
    button.btn-remove-cat {
      margin-top: 0;
      margin-bottom: 0;
      padding: 0;
      width: 1.85rem;
      height: 1.85rem;
      min-width: 1.85rem;
      font-size: 1.15rem;
      line-height: 1;
      font-weight: 500;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-shrink: 0;
      box-shadow: none;
      filter: none;
    }
    button.btn-remove-sub:hover,
    button.btn-remove-cat:hover {
      background: #fef2f2;
      color: #b91c1c;
      border-color: #fecaca;
    }
    button.btn-remove-cat { margin-left: auto; }
    .cat-main-row { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .diagram-panel {
      display: flex;
      flex-direction: column;
      flex: 1 1 320px;
      min-width: 320px;
      min-height: 480px;
    }
    .diagram-toolbar {
      margin-bottom: 0.65rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .diagram-toolbar button { margin-top: 0; margin-bottom: 0; }
    #btn-download-png:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #diagram {
      min-width: 320px;
      flex: 1;
      min-height: 480px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #ecfdf5 0%, #fff1f2 55%, #fdf2f8 100%);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    #diagram svg {
      width: 100%;
      height: 100%;
      min-height: 480px;
      display: block;
    }
    #diagram > p {
      margin: 0;
      padding: 1.5rem 1.25rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .node rect {
      stroke: rgba(15, 23, 42, 0.12);
      stroke-width: 1px;
    }
    .link {
      fill: none;
      stroke-opacity: 0.55;
    }
    .link:hover { stroke-opacity: 0.88; }
    .node-label-bg {
      fill: rgba(255, 255, 255, 0.94);
      stroke: rgba(15, 23, 42, 0.1);
      stroke-width: 1px;
    }
    .node-label {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      fill: var(--text);
      pointer-events: none;
    }
    .node-value {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      fill: var(--text-muted);
      pointer-events: none;
    }
    .flow-value {
      font-size: 11px;
      fill: var(--text-muted);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Geldfluss – Sankey-Diagramm</h1>
  <div class="layout">
    <div class="panel">
      <h2>Einnahmen</h2>
      <div id="income-rows">
        <div class="form-row income-row" data-income-index="1">
          <input type="text" id="income1-label" class="label-input" placeholder="z. B. Gehalt" value="Gehalt" />
          <input type="number" id="income1-value" class="value-input" value="1900" min="0" step="10" />
        </div>
        <div class="form-row income-row" data-income-index="2">
          <input type="text" id="income2-label" class="label-input" placeholder="z. B. Weitere Einkünfte" value="Weitere Einkünfte" />
          <input type="number" id="income2-value" class="value-input" value="400" min="0" step="10" />
        </div>
        <div id="income-extra-rows"></div>
      </div>
      <button type="button" class="btn-add" id="btn-add-income">+ Weitere Einnahme</button>
      <h2>Hauptkategorien</h2>
      <div id="categories-container"></div>
      <button type="button" class="btn-add" id="btn-add-category">+ Kategorie</button>
      <button type="button" id="btn-create">Diagramm erstellen</button>
    </div>
    <div class="panel diagram-panel">
      <div class="diagram-toolbar">
        <button type="button" class="btn-add" id="btn-download-png" disabled>PNG herunterladen</button>
      </div>
      <div id="diagram"></div>
    </div>
  </div>

  <script>
    (function () {
      const formatDE = (n) =>
        new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n) + '€';

      const MAX_INCOME_ROWS = 4;
      const MIN_CATEGORIES = 1;
      const MAX_CATEGORIES = 10;
      const MAX_EXTRAS_PER_CATEGORY = 2;

      /* Outcome side: rose / pink family (distinct per category) */
      const CATEGORY_MAIN_COLORS = [
        '#9d174d', '#be185d', '#db2777', '#ec4899', '#f472b6',
        '#e11d48', '#f43f5e', '#fb7185', '#fda4af', '#f9a8d4',
      ];

      function subColorFromMain(mainHex, subIdx) {
        const c = d3.color(mainHex);
        if (!c) return mainHex;
        return c.brighter(subIdx * 0.12 + 0.04).formatHex();
      }

      let catIdCounter = 0;

      const INITIAL_CATEGORIES = [
        { main: ['Wohnen', 950], s1: ['Miete', 850], s2: ['Strom', 100], extras: [] },
        { main: ['Täglicher Bedarf', 650], s1: ['Lebensmittel', 400], s2: ['Auto', 250], extras: [] },
        { main: ['Sparen', 700], s1: ['', 0], s2: ['', 0], extras: [] },
      ];

      function syncCategoryUI() {
        const blocks = document.querySelectorAll('#categories-container .category-block');
        const n = blocks.length;
        blocks.forEach((block) => {
          const rm = block.querySelector('.btn-remove-cat');
          if (rm) rm.hidden = n <= MIN_CATEGORIES;
          const extras = block.querySelectorAll('.cat-extra-row').length;
          const addBtn = block.querySelector('.btn-add-cat-extra');
          if (addBtn) addBtn.hidden = extras >= MAX_EXTRAS_PER_CATEGORY;
        });
        const addCat = document.getElementById('btn-add-category');
        if (addCat) addCat.hidden = n >= MAX_CATEGORIES;
      }

      function addExtraRowFromData(block, label, value) {
        const container = block.querySelector('.cat-extras');
        if (!container || container.querySelectorAll('.cat-extra-row').length >= MAX_EXTRAS_PER_CATEGORY) return;
        const row = document.createElement('div');
        row.className = 'form-row income-row cat-extra-row';
        row.innerHTML =
          '<button type="button" class="btn-remove-sub" title="Entfernen" aria-label="Entfernen">×</button>' +
          '<input type="text" class="label-input extra-label" placeholder="Weitere Position (optional)" />' +
          '<input type="number" class="value-input extra-value" min="0" step="10" />';
        row.querySelector('.extra-label').value = label;
        row.querySelector('.extra-value').value = String(value);
        container.appendChild(row);
      }

      function appendCategoryBlock(initial) {
        const id = String(++catIdCounter);
        const block = document.createElement('div');
        block.className = 'category-block';
        block.dataset.catId = id;
        const main = initial.main;
        const s1 = initial.s1;
        const s2 = initial.s2;
        const titleText = (main[0] || 'Kategorie').trim() || 'Kategorie';
        block.innerHTML =
          '<div class="form-row income-row cat-main-row">' +
          '<input type="text" id="cat-' + id + '-main-label" class="label-input cat-main-label-input" placeholder="Bezeichnung" />' +
          '<input type="number" id="cat-' + id + '-main" class="value-input" min="0" step="10" />' +
          '<button type="button" class="btn-remove-cat" title="Kategorie entfernen" aria-label="Kategorie entfernen">×</button>' +
          '</div>' +
          '<h3 class="cat-heading"></h3>' +
          '<div class="form-row income-row">' +
          '<input type="text" id="cat-' + id + '-s1-label" class="label-input" placeholder="Bezeichnung" />' +
          '<input type="number" id="cat-' + id + '-s1" class="value-input" min="0" step="10" />' +
          '</div>' +
          '<div class="form-row income-row">' +
          '<input type="text" id="cat-' + id + '-s2-label" class="label-input" placeholder="Bezeichnung" />' +
          '<input type="number" id="cat-' + id + '-s2" class="value-input" min="0" step="10" />' +
          '</div>' +
          '<div class="cat-extras"></div>' +
          '<button type="button" class="btn-add btn-add-cat-extra">+ Weitere Position</button>';

        document.getElementById('categories-container').appendChild(block);

        document.getElementById('cat-' + id + '-main-label').value = main[0];
        document.getElementById('cat-' + id + '-main').value = main[1];
        document.getElementById('cat-' + id + '-s1-label').value = s1[0];
        document.getElementById('cat-' + id + '-s1').value = s1[1];
        document.getElementById('cat-' + id + '-s2-label').value = s2[0];
        document.getElementById('cat-' + id + '-s2').value = s2[1];

        const heading = block.querySelector('.cat-heading');
        heading.textContent = titleText + ' →';

        block.querySelector('.cat-main-label-input').addEventListener('input', () => {
          const v = block.querySelector('.cat-main-label-input').value.trim() || 'Kategorie';
          heading.textContent = v + ' →';
        });

        (initial.extras || []).forEach((ex) => {
          addExtraRowFromData(block, ex[0], ex[1]);
        });

        syncCategoryUI();
      }

      function readPair(labelId, valueId) {
        const labelEl = document.getElementById(labelId);
        const valEl = document.getElementById(valueId);
        if (!labelEl || !valEl) return { label: '', value: 0 };
        return {
          label: (labelEl.value || '').trim(),
          value: Number(valEl.value) || 0,
        };
      }

      function getIncomeIndices() {
        return [...document.querySelectorAll('#income-rows .income-row[data-income-index]')]
          .map((el) => Number(el.dataset.incomeIndex))
          .filter((n) => !Number.isNaN(n))
          .sort((a, b) => a - b);
      }

      function getCategoryValues() {
        return [...document.querySelectorAll('#categories-container .category-block')].map((block) => {
          const id = block.dataset.catId;
          const main = readPair('cat-' + id + '-main-label', 'cat-' + id + '-main');
          const s1 = readPair('cat-' + id + '-s1-label', 'cat-' + id + '-s1');
          const s2 = readPair('cat-' + id + '-s2-label', 'cat-' + id + '-s2');
          const extras = [...block.querySelectorAll('.cat-extra-row')].map((row) => ({
            label: (row.querySelector('.extra-label').value || '').trim(),
            value: Number(row.querySelector('.extra-value').value) || 0,
          }));
          return {
            catId: id,
            mainLabel: main.label,
            budget: main.value,
            subs: [s1, s2, ...extras],
          };
        });
      }

      function getValues() {
        const incomes = getIncomeIndices().map((i) => ({
          label: (document.getElementById('income' + i + '-label').value || '').trim(),
          value: Number(document.getElementById('income' + i + '-value').value) || 0,
        }));
        return { incomes, categories: getCategoryValues() };
      }

      /** Sum of Hauptkategorie amounts must not exceed total Einnahmen (money into Budget). */
      function validateIncomeVsCategoryAllocations(v) {
        const totalIncome = v.incomes.reduce((s, inc) => s + (Number(inc.value) || 0), 0);
        const sumAlloc = v.categories.reduce((s, cat) => s + (Number(cat.budget) || 0), 0);
        if (sumAlloc <= totalIncome) return [];
        return [
          'Summe der Hauptkategorien (' +
            formatDE(sumAlloc) +
            ') übersteigt die Summe der Einnahmen (' +
            formatDE(totalIncome) +
            ').',
        ];
      }

      /** Returns German error lines, or empty array if every category's sub-sum ≤ that category's budget. */
      function validateCategorySubstreams(categories) {
        const errors = [];
        categories.forEach((cat, idx) => {
          const budget = Number(cat.budget) || 0;
          const sumSubs = cat.subs.reduce((acc, sub) => acc + (Number(sub.value) || 0), 0);
          if (sumSubs > budget) {
            const name = (cat.mainLabel || '').trim() || 'Kategorie ' + (idx + 1);
            errors.push(
              name +
                ': Summe der Unterkategorien (' +
                formatDE(sumSubs) +
                ') übersteigt das Budget (' +
                formatDE(budget) +
                ').'
            );
          }
        });
        return errors;
      }

      function syncIncomeAddButton() {
        const n = document.querySelectorAll('#income-rows .income-row[data-income-index]').length;
        document.getElementById('btn-add-income').hidden = n >= MAX_INCOME_ROWS;
      }

      function addIncomeRow() {
        const n = document.querySelectorAll('#income-rows .income-row[data-income-index]').length;
        if (n >= MAX_INCOME_ROWS) return;
        const next = n + 1;
        const wrap = document.getElementById('income-extra-rows');
        const div = document.createElement('div');
        div.className = 'form-row income-row';
        div.dataset.incomeIndex = String(next);
        div.innerHTML =
          '<input type="text" id="income' +
          next +
          '-label" class="label-input" placeholder="Weitere Position (optional)" value="" />' +
          '<input type="number" id="income' +
          next +
          '-value" class="value-input" value="0" min="0" step="10" />';
        wrap.appendChild(div);
        syncIncomeAddButton();
      }

      /* Income side: green shades */
      const INCOME_COLORS = ['#047857', '#059669', '#10b981', '#34d399'];

      function buildSankeyData(v) {
        const usedNames = new Set();
        function uniqueName(preferred) {
          let name = (preferred || '').trim() || 'Unbenannt';
          if (!usedNames.has(name)) {
            usedNames.add(name);
            return name;
          }
          let n = 2;
          while (usedNames.has(name + ' (' + n + ')')) n++;
          name = name + ' (' + n + ')';
          usedNames.add(name);
          return name;
        }

        const activeIncomes = v.incomes
          .map((inc, i) => {
            const name = uniqueName(inc.label.trim() || 'Einnahme ' + (i + 1));
            return { ...inc, name, color: INCOME_COLORS[i % INCOME_COLORS.length] };
          })
          .filter((inc) => inc.value > 0);

        const budgetName = uniqueName('Budget');
        const nodes = [
          ...activeIncomes.map((inc) => ({ id: inc.name, color: inc.color })),
          { id: budgetName, color: '#57534e' },
        ];
        const links = [
          ...activeIncomes.map((inc) => ({ source: inc.name, target: budgetName, value: inc.value })),
        ];

        v.categories.forEach((cat, idx) => {
          const mainColor = CATEGORY_MAIN_COLORS[idx % CATEGORY_MAIN_COLORS.length];
          const catName = uniqueName(cat.mainLabel || 'Kategorie ' + (idx + 1));
          nodes.push({ id: catName, color: mainColor });
          links.push({ source: budgetName, target: catName, value: cat.budget });
          cat.subs.forEach((sub, subIdx) => {
            if (sub.value <= 0) return;
            const subName = uniqueName(sub.label || 'Position ' + (subIdx + 1));
            const subColor = subColorFromMain(mainColor, subIdx);
            nodes.push({ id: subName, color: subColor });
            links.push({ source: catName, target: subName, value: sub.value });
          });
        });

        const filteredLinks = links.filter((l) => l.value > 0);

        return {
          nodes: nodes.map((n) => ({ name: n.id, color: n.color })),
          links: filteredLinks,
          budgetNodeName: budgetName,
        };
      }

      function syncDownloadButton() {
        const btn = document.getElementById('btn-download-png');
        if (!btn) return;
        btn.disabled = !document.getElementById('diagram').querySelector('svg');
      }

      function downloadDiagramPng() {
        const diagramEl = document.getElementById('diagram');
        const svgEl = diagramEl.querySelector('svg');
        if (!svgEl) return;
        const svg = svgEl.cloneNode(true);
        const w = Number(svg.getAttribute('width')) || svgEl.getBoundingClientRect().width;
        const h = Number(svg.getAttribute('height')) || svgEl.getBoundingClientRect().height;
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('width', String(w));
        bg.setAttribute('height', String(h));
        bg.setAttribute('fill', '#ffffff');
        svg.insertBefore(bg, svg.firstChild);
        svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        if (!svg.getAttribute('font-family')) {
          svg.setAttribute('font-family', 'system-ui, -apple-system, sans-serif');
        }
        const serializer = new XMLSerializer();
        const source = serializer.serializeToString(svg);
        const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          const scale = 2;
          const canvas = document.createElement('canvas');
          canvas.width = Math.ceil(w * scale);
          canvas.height = Math.ceil(h * scale);
          const ctx = canvas.getContext('2d');
          ctx.scale(scale, scale);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((pngBlob) => {
            if (!pngBlob) return;
            const a = document.createElement('a');
            a.download = 'geldfluss-sankey.png';
            a.href = URL.createObjectURL(pngBlob);
            a.click();
            URL.revokeObjectURL(a.href);
          }, 'image/png');
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          alert('PNG-Export fehlgeschlagen.');
        };
        img.src = url;
      }

      function render(el, data) {
        d3.select(el).selectAll('*').remove();
        if (data.links.length === 0) {
          el.innerHTML = '<p>Werte eingeben und „Diagramm erstellen“ klicken.</p>';
          syncDownloadButton();
          return;
        }

        const nodeColors = data.nodes.map((n) => n.color || '#999');
        const sankeyNodes = data.nodes.map((n) => ({ name: n.name }));
        const sankeyLinks = data.links.map((l) => ({
          source: sankeyNodes.findIndex((n) => n.name === l.source),
          target: sankeyNodes.findIndex((n) => n.name === l.target),
          value: l.value,
        }));

        const width = el.clientWidth || 600;
        const height = Math.max(480, el.clientHeight || 480);
        const margin = { top: 24, right: 140, bottom: 24, left: 24 };
        const diagramWidth = width - margin.left - margin.right;
        const diagramHeight = height - margin.top - margin.bottom;

        const sankey = d3.sankey()
          .nodeWidth(24)
          .nodePadding(28)
          .size([diagramWidth, diagramHeight])
          .nodeAlign(d3.sankeyLeft);

        const { nodes, links } = sankey({
          nodes: sankeyNodes.map((d) => ({ ...d })),
          links: sankeyLinks,
        });

        const svg = d3.select(el).append('svg').attr('width', width).attr('height', height);
        const g = svg.append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

        const link = g.append('g')
          .selectAll('path')
          .data(links)
          .join('path')
          .attr('class', 'link')
          .attr('d', d3.sankeyLinkHorizontal())
          .attr('stroke', (d) => {
            const i = d.source.index;
            return nodeColors[i] || '#999';
          })
          .attr('stroke-width', (d) => Math.max(2, d.width));

        link.append('title').text((d) => formatDE(d.value));

        const node = g.append('g')
          .selectAll('g')
          .data(nodes)
          .join('g')
          .attr('transform', (d) => 'translate(' + d.x0 + ',' + d.y0 + ')');

        node.append('rect')
          .attr('width', (d) => d.x1 - d.x0)
          .attr('height', (d) => d.y1 - d.y0)
          .attr('fill', (d) => nodeColors[d.index])
          .attr('stroke', '#999');

        const labelPadding = 8;
        const rightmostX = d3.max(nodes, (n) => n.x0);
        node.each(function (d) {
          const nodeW = d.x1 - d.x0;
          const nodeH = d.y1 - d.y0;
          const isRightmostColumn = d.x0 >= rightmostX - 1;
          const toLeft = isRightmostColumn;
          const textX = toLeft ? -labelPadding : nodeW + labelPadding;
          const gNode = d3.select(this);
          const wrap = gNode.append('g').attr('class', 'node-label-wrap');
          const lines = wrap.append('g').attr('class', 'node-label-lines');
          lines
            .append('text')
            .attr('class', 'node-label')
            .attr('x', 0)
            .attr('y', -6)
            .attr('text-anchor', 'start')
            .attr('dy', '0.35em')
            .text(d.name);
          lines
            .append('text')
            .attr('class', 'node-value')
            .attr('x', 0)
            .attr('y', 8)
            .attr('text-anchor', 'start')
            .attr('dy', '0.35em')
            .text(() => {
              const incoming = d3.sum(links.filter((l) => l.target === d), (l) => l.value);
              const outgoing = d3.sum(links.filter((l) => l.source === d), (l) => l.value);
              return formatDE(incoming || outgoing);
            });
          const padX = 8;
          const padY = 5;
          const labelEl = lines.select('.node-label').node();
          const valueEl = lines.select('.node-value').node();
          const wText = Math.max(labelEl.getComputedTextLength(), valueEl.getComputedTextLength());
          const minX = Math.min(labelEl.getBBox().x, valueEl.getBBox().x);
          const bbox = lines.node().getBBox();
          const innerLeft = minX - padX;
          const innerRight = wText + padX;
          const wrapX = toLeft ? textX - innerRight : textX - innerLeft;
          wrap.attr('transform', 'translate(' + wrapX + ',' + nodeH / 2 + ')');
          wrap
            .insert('rect', ':first-child')
            .attr('class', 'node-label-bg')
            .attr('x', minX - padX)
            .attr('y', bbox.y - padY)
            .attr('width', wText - minX + padX * 2)
            .attr('height', bbox.height + padY * 2)
            .attr('rx', 4)
            .attr('ry', 4);
        });
        syncDownloadButton();
      }

      document.getElementById('btn-add-income').addEventListener('click', addIncomeRow);

      document.getElementById('categories-container').addEventListener('click', (e) => {
        const addExtra = e.target.closest('.btn-add-cat-extra');
        if (addExtra) {
          const block = addExtra.closest('.category-block');
          addExtraRowFromData(block, '', 0);
          syncCategoryUI();
          return;
        }
        if (e.target.closest('.btn-remove-sub')) {
          e.target.closest('.cat-extra-row').remove();
          syncCategoryUI();
          return;
        }
        if (e.target.closest('.btn-remove-cat')) {
          if (document.querySelectorAll('#categories-container .category-block').length <= MIN_CATEGORIES) return;
          e.target.closest('.category-block').remove();
          syncCategoryUI();
        }
      });

      document.getElementById('btn-add-category').addEventListener('click', () => {
        if (document.querySelectorAll('#categories-container .category-block').length >= MAX_CATEGORIES) return;
        appendCategoryBlock({
          main: ['Neue Kategorie', 0],
          s1: ['', 0],
          s2: ['', 0],
          extras: [],
        });
      });

      INITIAL_CATEGORIES.forEach((d) => appendCategoryBlock(d));

      syncIncomeAddButton();

      const diagramEl = document.getElementById('diagram');
      document.getElementById('btn-download-png').addEventListener('click', downloadDiagramPng);
      document.getElementById('btn-create').addEventListener('click', () => {
        const v = getValues();
        const allocErrors = validateIncomeVsCategoryAllocations(v);
        const subErrors = validateCategorySubstreams(v.categories);
        const allErrors = allocErrors.concat(subErrors);
        if (allErrors.length > 0) {
          alert('Bitte Werte prüfen:\n\n' + allErrors.join('\n\n'));
          return;
        }
        render(diagramEl, buildSankeyData(v));
      });

      const initial = getValues();
      render(diagramEl, buildSankeyData(initial));
    })();
  </script>
</body>
</html>
